<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="#1a1a1a"/>

  <!-- Grid lines -->
  <line x1="0" y1="40" x2="900" y2="40" stroke="#2a2a2a" stroke-width="0.5"/>
  <line x1="0" y1="80" x2="900" y2="80" stroke="#2a2a2a" stroke-width="0.5"/>
  <line x1="0" y1="120" x2="900" y2="120" stroke="#2a2a2a" stroke-width="0.5"/>
  <line x1="0" y1="160" x2="900" y2="160" stroke="#2a2a2a" stroke-width="0.5"/>
  <line x1="0" y1="200" x2="900" y2="200" stroke="#2a2a2a" stroke-width="0.5"/>
  <line x1="0" y1="240" x2="900" y2="240" stroke="#2a2a2a" stroke-width="0.5"/>

  <!-- Accent bars (top and bottom) -->
  <rect x="0" y="0" width="900" height="4" fill="#FF6B00"/>
  <rect x="0" y="276" width="900" height="4" fill="#FF6B00"/>

  <!-- Corner marks — top left -->
  <line x1="30" y1="30" x2="30" y2="55" stroke="#FF6B00" stroke-width="2"/>
  <line x1="30" y1="30" x2="55" y2="30" stroke="#FF6B00" stroke-width="2"/>

  <!-- Corner marks — top right -->
  <line x1="870" y1="30" x2="870" y2="55" stroke="#FF6B00" stroke-width="2"/>
  <line x1="870" y1="30" x2="845" y2="30" stroke="#FF6B00" stroke-width="2"/>

  <!-- Corner marks — bottom left -->
  <line x1="30" y1="250" x2="30" y2="225" stroke="#FF6B00" stroke-width="2"/>
  <line x1="30" y1="250" x2="55" y2="250" stroke="#FF6B00" stroke-width="2"/>

  <!-- Corner marks — bottom right -->
  <line x1="870" y1="250" x2="870" y2="225" stroke="#FF6B00" stroke-width="2"/>
  <line x1="870" y1="250" x2="845" y2="250" stroke="#FF6B00" stroke-width="2"/>

  <!-- Title -->
  <text x="450" y="110" text-anchor="middle" font-family="'Space Mono', 'Courier New', monospace" font-size="64" font-weight="700" fill="#ffffff" letter-spacing="-2">gui.md</text>

  <!-- Subtitle -->
  <text x="450" y="155" text-anchor="middle" font-family="'Space Mono', 'Courier New', monospace" font-size="16" fill="#FF6B00" letter-spacing="4">VIRTUAL DOM UI FRAMEWORK FOR GO</text>

  <!-- Description -->
  <text x="450" y="195" text-anchor="middle" font-family="'Space Mono', 'Courier New', monospace" font-size="13" fill="#666666" letter-spacing="1">COMPONENTS. DIFFING. STORES. HTML + WASM RENDERERS.</text>

  <!-- Version badge -->
  <rect x="405" y="215" width="90" height="28" rx="2" fill="none" stroke="#FF6B00" stroke-width="1"/>
  <text x="450" y="234" text-anchor="middle" font-family="'Space Mono', 'Courier New', monospace" font-size="13" fill="#FF6B00">v0.1.0</text>
</svg>
